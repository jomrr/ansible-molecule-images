---
- name: "PLAYBOOK | Generate Dockerfiles and build container images"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Import variable files"
      ansible.builtin.include_vars:
        file: "{{ lookup('ansible.builtin.first_found', params) }}"
      vars:
        params:
          files:
            - "{{ inventory_hostname }}.yml"
            - "{{ push_image }}.yml"
          paths:
            - 'vars'
          skip: false

    - name: "Create build directory"
      ansible.builtin.file:
        path: "{{ build_dir }}/{{ push_image }}"
        state: directory
        mode: '0755'

    - name: "Generate Dockerfile"
      ansible.builtin.template:
        src: "templates/Dockerfile.j2"
        dest: "{{ build_dir }}/{{ push_image }}/{{ inventory_hostname }}"
        mode: '0644'

    - name: "Generate tag/registry push matrix"
      no_log: "{{ build_no_log }}"
      ansible.builtin.set_fact:
        _images: "{{ _images | default([]) + [{'tag': tag, 'image': push_image} | combine(push_registries)] }}"
      loop: "{{ push_tags }}"
      loop_control:
        loop_var: tag
        label: "{{ inventory_hostname }}:{{ tag }}"
      vars:
        _images: []

    - name: "Build container images and push to registries"
      no_log: "{{ build_no_log }}"
      containers.podman.podman_image:
        name: "{{ item.name }}/{{ item.username }}/molecule-{{ item.image }}"
        build:
          file: "{{ build_dir }}/{{ push_image }}/{{ inventory_hostname }}"
          force_rm: true
          format: docker
          extra_args: "--network pasta:--ipv4-only"
        force: true
        path: "{{ build_dir }}/{{ push_image }}"
        state: build
        tag: "{{ item.tag }}"
        push: true
        username: "{{ item.username }}"
        password: "{{ item.password }}"
      loop: "{{ _images }}"
      loop_control:
        loop_var: item
        label: "{{ item.name }}/{{ item.username }}/molecule-{{ item.image }}:{{ item.tag }}"

