---
# repo: jomrr/ansible-molecule-images
# file: playbooks/build.yml

- name: "PLAYBOOK | Generate Dockerfiles and build container images"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Import variable files"
      ansible.builtin.include_vars:
        file: "{{ lookup('ansible.builtin.first_found', params) }}"
      vars:
        params:
          files:
            - "{{ inventory_hostname }}.yml"
            - "{{ push_image }}.yml"
          paths:
            - 'vars'
          skip: false

    - name: "Create build directory"
      ansible.builtin.file:
        path: "{{ build_dir }}/{{ push_image }}"
        state: directory
        mode: '0755'

    - name: "Generate Dockerfile"
      ansible.builtin.template:
        src: "templates/Dockerfile.j2"
        dest: "{{ build_dir }}/{{ push_image }}/{{ inventory_hostname }}"
        mode: '0644'

    - name: "Generate tag/push matrix"
      no_log: "{{ build_no_log }}"
      ansible.builtin.set_fact:
        _targets: "{{ (_targets | default([])) + [target_spec] }}"
      vars:
        registry: "{{ pair.0 }}"
        push_tag: "{{ pair.1 }}"
        target_spec:
          username: "{{ registry.username }}"
          password: "{{ registry.password }}"
          target: "{{ registry.name }}/{{ registry.username }}/{{ push_repo }}:{{ push_tag }}"
          origin: "{{ registry.name }}/{{ registry.username }}/{{ push_repo }}"
          tag: "{{ push_tag }}"
      loop: "{{ push_registries | product(push_tags) | list }}"
      loop_control:
        loop_var: pair
        label: "{{ pair.0.name }}/{{ pair.0.username }}/{{ push_repo }}:{{ pair.1 }}"

    - name: "Build local image once per variant"
      no_log: "{{ build_no_log }}"
      containers.podman.podman_image:
        name: "localhost/{{ push_repo }}"
        tag: "{{ inventory_hostname }}"
        path: "{{ build_dir }}/{{ push_image }}"
        state: build
        build:
          cache: true
          file: "{{ build_dir }}/{{ push_image }}/{{ inventory_hostname }}"
          force_rm: true
          format: docker
          extra_args: >-
            --layers
            --source-date-epoch={{ lookup('pipe', 'git log -1 --pretty=%ct') }}
            --rewrite-timestamp
        force: true

    - name: "Tag local image for all targets"
      no_log: "{{ build_no_log }}"
      containers.podman.podman_tag:
        image: "localhost/{{ push_repo }}:{{ inventory_hostname }}"
        target_names: "{{ _targets | map(attribute='target') | unique | list }}"

    - name: "Push all tags to registries"
      no_log: "{{ build_no_log }}"
      containers.podman.podman_image:
        name: "{{ push.origin }}"
        tag: "{{ push.tag }}"
        push: true
        username: "{{ push.username }}"
        password: "{{ push.password }}"
      loop: "{{ _targets }}"
      loop_control:
        loop_var: push
        label: "{{ push.target }}"
