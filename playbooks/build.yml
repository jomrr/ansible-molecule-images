- name: "PLAYBOOK | Prune podman images"
  hosts: all
  gather_facts: false
  strategy: linear
  tasks:
    - name: "Prune dangling images"
      run_once: true
      containers.podman.podman_prune:
        image: true
        image_filters:
          dangling_only: true
